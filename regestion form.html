<html>
    <head>
        <title>Registeration Form</title>
        
    </head>
    <body style=>
        <form>
        <div style="height: 150%;width: 40%;border: 1px solid black; margin-left: 30%; background-image: linear-gradient(gray, pink ,aqua); ">
            <div style="height: 8%;width: 100%; border: 1px solid black; margin-bottom: 5%;">
                 <h1 style="text-align: center;">Registeration Form</h1>
            </div>
            <center>
                <h2>
                <table>
                    <tr>
                        <td>Student Id</td>
                        <td><input type="number" placeholder="Enter your Student Id"></td>
                    </tr>
                </table>
                <table>
                    <tr>
                        <td>First Name</td>
                        <td><input type="text" placeholder="Enter your first name"></td>
                    </tr>
                </table>
                <table>
                    <tr>
                        <td>Middle name</td>
                        <td><input type="text" placeholder="Enter your middle name"/></td>
                    </tr>
                </table>
                <table>
                    <tr>
                        <td>Last name</td>
                        <td><input type="text" placeholder="Enter your last name"/>
                        </td>
                    </tr>
                </table>
                <table>
                    <tr>
                        <td>Date of birth</td>
                        <td><input type="date" placeholder="Date of birth"></td>
                    </tr>
                </table>
                <table>
                    <tr>
                        <td>Gender</td>
                        <td><input type="radio" name="m">Male</td>
                        <td><input type="radio"name="m">Female</td>
                        <td><input type="radio" name="m">Other</td>
                    </tr>
                </table>
                <table>
                    <tr>
                        <td>Course Name</td>
                        <td>
                            <select>
                                <option>Web Designing & Development.</option>
                                <option>Software Engineering</option>
                                <option>Digital Marketing.</option>
                                <option>Graphic Designing</option>
                                <option>Graphic Designing</option>
                                <option>Graphic Designing</option>
                                <option>MS Office Certification Program</option>
                                <option>Hardware Engineering</option>
                                <option>Other Courses</option>
                            </select>
                        </td>
                    </tr>
                </table>
                <table>
                    <tr>
                        <td>Year/sem</td>
                        <td>
                            <select>
                                <option>2year</option>
                                <option>3year</option>
                                <option>4year</option>
                                <option>5year</option>
                                <option>6year</option>
                                <option>7year</option>

                            </select>
                        </td>
                    </tr>
                </table>
                <table>
                    <tr>
                        <td>Departement</td>
                        <td>
                            <select>
                                <option>University Polytechnic</option>
                                <option>Department of Arabic</option>
                                <option>Department of Art History & Art Appreciation</option>
                                <option>Department of Chemistry</option>
                                <option>Department of Computer Engineering</option>
                                <option>Department of Economics</option>
                                <option>Department of Hindi</option>
                                <option>Department of Islamic Studies</option>
                                <option>Department of Mechanical Engineering</option>
                                <option>Department of Painting</option>
                                <option>Department of Architecture</option>
                                <option>Department of Biotechnology</option>
                            </select>
                        </td>
                    </tr>
                </table>
                <table>
                    <tr>
                        <td>Email ID</td>
                        <td><input type="email" placeholder="Enter your email id"></td>
                    </tr>
                </table>
                <table>
                    <tr>
                        <td>Adders</td>
                        <td><input type="text area" placeholder="Enter your adders"></td>
                    </tr>
                </table>
                <table>
                    <tr>
                        <td>Phone no</td>
                        <td><input type="number" placeholder="Enter your pphone no"></td>
                    </tr>
                </table>
                <table>
                    <tr>
                        <td><input type="submit"></td>
                        <td><input type="reset"></td>
                    </tr>
                </table>
            </h2>
            </center>
        
        </div>
    </form>
    </body>
</html>
